# Kaggle mini — fast sanity check before full kaggle.yaml (25 epochs, full data).
# Same dataset paths as kaggle.yaml; caps train/val size + 3 epochs.
#
# Run (notebook, from SimpleImageCaptioner/):
#   python train.py --config configs/kaggle_mini.yaml
#
# Then train VQA with SimpleVQA/configs/kaggle_mini.yaml (uses outputs/kaggle_mini/best.pt).

seed: 42
train_captions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/Caption/Caption/captions_train2014.json
val_captions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/Caption/Caption/captions_val2014.json
train_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/train2014
val_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
save_dir: outputs/kaggle_mini
num_workers: 2
batch_size: 8
epochs: 3
learning_rate: 0.0005
max_caption_len: 20
vocab_min_freq: 4
max_regions: 32
word_dim: 512
lstm_hidden: 512
embed_dim: 512
region_dim: 2048
device: cuda
# ~1000 train images ≈ few hours on Kaggle GPU (not 15h/epoch full run)
max_train_images: 1000
max_val_images: 200

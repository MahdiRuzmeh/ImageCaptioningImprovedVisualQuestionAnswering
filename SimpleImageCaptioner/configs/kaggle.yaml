seed: 42
train_captions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/Caption/Caption/captions_train2014.json
val_captions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/Caption/Caption/captions_val2014.json
train_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/train2014
val_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
save_dir: outputs/kaggle
# Kaggle 2xT4: torchrun --nproc_per_node=2 train.py --config configs/kaggle.yaml
num_workers: 2
batch_size: 32
epochs: 10
# Finglish: eval_every — val har n epoch (1=har epoch). Akharin epoch hamishe eval mishe.
eval_every: 3
learning_rate: 0.0005
dropout: 0.5
lr_decay_factor: 0.6
lr_decay_interval: 4
use_amp: true
grad_accum_steps: 1
max_caption_len: 20
vocab_min_freq: 4
max_regions: 32
cache_regions: true
# Finglish: train/val cache joda — baraye didan val cache check kon val/ folder.
train_region_cache_dir: /kaggle/working/region_cache/captioner/train
val_region_cache_dir: /kaggle/working/region_cache/captioner/val
image_size: 448
pin_memory: true
persistent_workers: true
prefetch_factor: 2
word_dim: 512
lstm_hidden: 512
embed_dim: 512
region_dim: 2048
use_gnn: true
gnn_dim: 512
device: cuda
#DDP ro faghat roye Kaggle (2xT4) roshan kon.
ddp: true
ddp_backend: nccl
max_train_images: null
max_val_images: 3000
# Paper §5 scheduled sampling (GT token mixed with model prediction during train)
# scheduled_sampling_p dar aval kar 0 khahad bood (kamalan teacher forcing hast)
scheduled_sampling_max_prob: 0.24
scheduled_sampling_interval: 4
scheduled_sampling_increment: 0.06

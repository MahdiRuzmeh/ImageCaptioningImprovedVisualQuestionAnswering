seed: 42
train_captions_json: ../dataset/captions_train2014.json
val_captions_json: ../dataset/captions_val2014.json
train_images_dir: ../dataset/train2014
val_images_dir: ../dataset/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
save_dir: outputs/smoke
num_workers: 0
batch_size: 8
epochs: 4
learning_rate: 0.0005
use_amp: true
grad_accum_steps: 1
max_caption_len: 20
vocab_min_freq: 4
max_regions: 16
cache_regions: true
region_cache_dir: outputs/region_cache/captioner
image_size: 224
pin_memory: true
persistent_workers: false
prefetch_factor: 2
word_dim: 512
lstm_hidden: 512
embed_dim: 512
region_dim: 2048
device: cuda
ddp: false
ddp_backend: nccl
max_train_images: 200
max_val_images: 50

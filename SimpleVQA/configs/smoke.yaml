seed: 42
train_questions_json: ../dataset/v2_OpenEnded_mscoco_train2014_questions.json
train_annotations_json: ../dataset/v2_mscoco_train2014_annotations.json
val_questions_json: ../dataset/v2_OpenEnded_mscoco_val2014_questions.json
val_annotations_json: ../dataset/v2_mscoco_val2014_annotations.json
train_images_dir: ../dataset/train2014
val_images_dir: ../dataset/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
use_captioner: true
# ---------------------------------------------------------------------------
# caption_repr — chegunegi-e sakht-e v_cap (faghat vaghti use_captioner: true)
# ---------------------------------------------------------------------------
# EN: "hidden" = legacy (mean of caption LSTM hidden states, now EOS-masked).
#     "text"   = paper-faithful: generate caption tokens then encode them with a
#                small trainable GRU → injects real caption semantics. Use "text"
#                to test whether captions actually help (recommended ablation).
# FA: "hidden" = ghadimi (miangin hidden-state, hala EOS-mask shode).
#     "text"   = motabegh-e maghale: token-haye caption tolid va ba yek GRU-ye
#                trainable encode mishan → ma'na-ye vaghei-e caption tazrigh mishe.
#                Baraye test-e inke aya caption komak mikone "text" ro emtehan kon.
caption_repr: hidden
captioner_project_root: ../SimpleImageCaptioner
captioner_ckpt: ../SimpleImageCaptioner/outputs/smoke/best.pt
captioner_class: SimpleImageCaptioner
num_workers: 0
batch_size: 8
grad_accum_steps: 1
epochs: 100
eval_every: 10
# overfit sanity: LR balatar + bedoon decay ta 100 sample kamel memorize beshe.
learning_rate: 0.001
lr_decay_every: 30
lr_decay_factor: 0.6
max_question_len: 14
max_answer_len: 6
vocab_min_freq: 4
# overfit sanity: AMP khamush ta gradient-scaler skip nakone.
use_amp: false
max_regions: 32
cache_regions: true
train_region_cache_dir: outputs/region_cache/vqa/train
val_region_cache_dir: outputs/region_cache/vqa/val
# cache_global: khoroji raw ResNet-101 (2048d, qabl az g_proj) disk save mikone.
# g_proj linear layer CACHE NEMISHE va hamishe ejra mishe (trainable).
cache_global: true
train_global_cache_dir: outputs/global_cache/vqa/train
val_global_cache_dir: outputs/global_cache/vqa/val
image_size: 448
device: cuda
ddp: false
ddp_backend: nccl
hidden_dim: 512
word_dim: 512
question_dim: 1280
# fuse_mode: paper §5 ablation → concatenation behtarin natije mide (mul/add ham support mishe).
fuse_mode: concat
# dropout: ba'de har projection (g_proj, local_proj, q_proj, v_att) va bayn LSTM cells va qabl az classifier.
# smoke: 0.3 — hamoon default ta overfit sanity check ham bebini.
dropout: 0
save_dir: outputs/smoke
# save_model_type: "epoch" = save last.pt after each train epoch; "item" = every n samples.
save_model_type: epoch
# in hyperparameter vagti estefade mishe ke "save_model_type" = "item" bashe.
# save_every_samples: global train samples between last.pt writes (when save_model_type=item).
save_every_samples: 50
max_train_qids: 100
max_val_qids: 100

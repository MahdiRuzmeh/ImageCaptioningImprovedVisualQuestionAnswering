seed: 42
# VQA v2 paths — az SimpleVQA/ run kon; relative path ha resolve mishan.
train_questions_json: ../dataset/v2_OpenEnded_mscoco_train2014_questions.json
train_annotations_json: ../dataset/v2_mscoco_train2014_annotations.json
val_questions_json: ../dataset/v2_OpenEnded_mscoco_val2014_questions.json
val_annotations_json: ../dataset/v2_mscoco_val2014_annotations.json
train_images_dir: ../dataset/train2014
val_images_dir: ../dataset/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
# Captioner freeze shode az SimpleImageCaptioner load mishe (marhale 2 paper).
captioner_project_root: ../SimpleImageCaptioner
captioner_ckpt: ../SimpleImageCaptioner/outputs/default/best.pt
captioner_class: SimpleImageCaptioner
num_workers: 2
prefetch_factor: 2
pin_memory: true
persistent_workers: true
batch_size: 4
grad_accum_steps: 4
epochs: 25
learning_rate: 0.0005
lr_decay_every: 4
lr_decay_factor: 0.6
max_question_len: 14
max_answer_len: 6
vocab_min_freq: 4
use_amp: true
max_regions: 32
cache_regions: true
# degat kon age max_regions ya region_dim farg kone cache dige valid nist. 
# (batch, max_regions, region_dim) example: (N, 32, 2048) 
region_cache_dir: outputs/region_cache/vqa
# cache_global: khoroji raw ResNet-101 (2048d, qabl az g_proj) disk save mikone.
# g_proj linear layer CACHE NEMISHE va hamishe ejra mishe (trainable).
cache_global: true
global_cache_dir: outputs/global_cache/vqa
image_size: 448
device: cuda
ddp: false
ddp_backend: nccl
hidden_dim: 512
word_dim: 512
question_dim: 1280
fuse_mode: mul
save_dir: outputs/default
max_train_qids: null
max_val_qids: null

seed: 42
# VQA v2 paths — az SimpleVQA/ run kon; relative path ha resolve mishan.
train_questions_json: ../dataset/v2_OpenEnded_mscoco_train2014_questions.json
train_annotations_json: ../dataset/v2_mscoco_train2014_annotations.json
val_questions_json: ../dataset/v2_OpenEnded_mscoco_val2014_questions.json
val_annotations_json: ../dataset/v2_mscoco_val2014_annotations.json
train_images_dir: ../dataset/train2014
val_images_dir: ../dataset/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
# Captioner freeze shode az SimpleImageCaptioner load mishe (marhale 2 paper).
use_captioner: true
captioner_project_root: ../SimpleImageCaptioner
captioner_ckpt: ../SimpleImageCaptioner/outputs/default/best.pt
captioner_class: SimpleImageCaptioner
# false = freeze hame captioner (QD Stage-1 q_emb/q_gru ghablan train shode)
# true  = q_emb + q_gru az answer loss fine-tune mishavan
captioner_finetune_q: false
num_workers: 2
prefetch_factor: 2
pin_memory: true
persistent_workers: true
batch_size: 4
grad_accum_steps: 4
epochs: 25
# Finglish: eval_every — validation har chand epoch? 1=har epoch ; 5=har 5 epoch + akhar.
eval_every: 1
learning_rate: 0.0005
lr_decay_every: 4
lr_decay_factor: 0.6
max_question_len: 14
max_answer_len: 6
vocab_min_freq: 4
use_amp: true
max_regions: 32
cache_regions: true
# Finglish: train/val region cache joda — raw FasterRCNN (1024d) ghabl az local_proj.
train_region_cache_dir: outputs/region_cache/vqa/train
val_region_cache_dir: outputs/region_cache/vqa/val
# cache_global: khoroji raw ResNet-101 (2048d, qabl az g_proj) disk save mikone.
# g_proj linear layer CACHE NEMISHE va hamishe ejra mishe (trainable).
cache_global: true
train_global_cache_dir: outputs/global_cache/vqa/train
val_global_cache_dir: outputs/global_cache/vqa/val
image_size: 448
device: cuda
ddp: false
ddp_backend: nccl
hidden_dim: 512
word_dim: 512
question_dim: 1280
fuse_mode: mul
# dropout: ba'de har projection (g_proj, local_proj, q_proj, v_att) va bayn LSTM cells va qabl az classifier.
# 0.3 standard baraye VQA ast (Bottom-Up & Top-Down paper ham hamin estefade mikone).
dropout: 0.3
save_dir: outputs/default
# save_model_type: "epoch" = save last.pt after each train epoch; "item" = every n samples.
# degat kon in fagat nahve update shodan last.pt ro moshakhas mikone.
#  best.pt hamishe ba best validation accurcy updaye mishe.
save_model_type: epoch
# in hyperparameter vagti estefade mishe ke "save_model_type" = "item" bashe.
# save_every_samples: global train samples between last.pt writes (when save_model_type=item).
# One sample = one (image, question, answer) triplet.
save_every_samples: 2000
max_train_qids: null
max_val_qids: null

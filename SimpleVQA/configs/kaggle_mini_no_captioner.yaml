# Kaggle mini ablation — VQA bedoon Image Captioner (v = v_att faghat).
# Hamoon hyperparam haye kaggle_mini; faghat use_captioner: false.
#
# Run (from SimpleVQA/):
#   python train.py --config configs/kaggle_mini_no_captioner.yaml
#   python train.py --config configs/kaggle_mini_no_captioner.yaml --eval --ckpt outputs/kaggle_mini_no_captioner/best.pt

seed: 42
train_questions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Questions/v2_OpenEnded_mscoco_train2014_questions.json
train_annotations_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Annotations/v2_mscoco_train2014_annotations.json
val_questions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Questions/v2_OpenEnded_mscoco_val2014_questions.json
val_annotations_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Annotations/v2_mscoco_val2014_annotations.json
train_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/train2014
val_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
use_captioner: false
num_workers: 2
prefetch_factor: 2
pin_memory: true
persistent_workers: true
batch_size: 8
grad_accum_steps: 1
epochs: 150
eval_every: 1
learning_rate: 0.0005
lr_decay_every: 100000
lr_decay_factor: 0.6
max_question_len: 14
max_answer_len: 6
vocab_min_freq: 4
use_amp: false
max_regions: 32
cache_regions: true
train_region_cache_dir: /kaggle/working/region_cache/vqa/train
val_region_cache_dir: /kaggle/working/region_cache/vqa/val
cache_global: true
train_global_cache_dir: /kaggle/working/global_cache/vqa/train
val_global_cache_dir: /kaggle/working/global_cache/vqa/val
image_size: 448
device: cuda
ddp: false
ddp_backend: nccl
ddp_find_unused_parameters: false
hidden_dim: 512
word_dim: 512
question_dim: 1280
fuse_mode: concat
dropout: 0
save_dir: outputs/kaggle_mini_no_captioner
max_train_qids: 100
max_val_qids: 100

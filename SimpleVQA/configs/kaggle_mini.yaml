# Kaggle mini — fast VQA sanity check before full training.
# Run AFTER SimpleImageCaptioner kaggle_mini (or point captioner_ckpt at your checkpoint).
#
# Run (notebook, from SimpleVQA/):
#   # Kaggle 2xT4 (ddp: true):
#   torchrun --nproc_per_node=2 train.py --config configs/kaggle_mini.yaml
#   # Local single GPU (ddp: false):
#   python train.py --config configs/smoke.yaml
#   python train.py --config configs/kaggle_mini.yaml --eval --ckpt outputs/kaggle_mini/best.pt
#
# Adjust /kaggle/input/... paths if your Kaggle dataset layout differs.

seed: 42
train_questions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Questions/v2_OpenEnded_mscoco_train2014_questions.json
train_annotations_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Annotations/v2_mscoco_train2014_annotations.json
val_questions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Questions/v2_OpenEnded_mscoco_val2014_questions.json
val_annotations_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Annotations/v2_mscoco_val2014_annotations.json
train_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/train2014
val_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
use_captioner: false
# ---------------------------------------------------------------------------
# caption_repr — chegunegi-e sakht-e v_cap (faghat vaghti use_captioner: true)
# ---------------------------------------------------------------------------
# EN: "hidden" = legacy (mean of caption LSTM hidden states, now EOS-masked).
#     "text"   = paper-faithful: generate caption tokens then encode them with a
#                small trainable GRU → injects real caption semantics. Use "text"
#                to test whether captions actually help (recommended ablation).
# FA: "hidden" = ghadimi (miangin hidden-state, hala EOS-mask shode).
#     "text"   = motabegh-e maghale: token-haye caption tolid va ba yek GRU-ye
#                trainable encode mishan → ma'na-ye vaghei-e caption tazrigh mishe.
#                Baraye test-e inke aya caption komak mikone "text" ro emtehan kon.
caption_repr: text
captioner_project_root: /kaggle/working/ImageCaptioningImprovedVisualQuestionAnswering/SimpleImageCaptioner
captioner_ckpt: /kaggle/input/notebooks/mahdirouzmeh/vqa-firstbasepaper/outputs/kaggle_mini/best.pt
captioner_class: SimpleImageCaptioner
num_workers: 2
prefetch_factor: 2
pin_memory: true
persistent_workers: true
# HARNESS (architecture comparison): batch bozorg-tar baraye generalization-e vaghei.
batch_size: 32
grad_accum_steps: 1
# HARNESS: budget-e sabet — hame azmayesh-ha ba hamin epochs moghayese mishan.
epochs: 30
# HARNESS: lr 0.001 ba schedule-e decay (na overfit-e 100 sample).
learning_rate: 0.001
# HARNESS: schedule-e vaghei — har n epoch lr ro nesf kon.
lr_decay_every: 10
lr_decay_factor: 0.5
# ---------------------------------------------------------------------------
# Anti-overfit knobs (jadid)
# ---------------------------------------------------------------------------
# EN: weight_decay = L2 regularization in the optimizer. 0.0 reproduces the old
#     runs; 1e-4 is a good starting point to fight the train/val gap on 20k qids.
# FA: weight_decay = regularization-e L2 dar optimizer. 0.0 = raftar-e ghadimi;
#     1e-4 noghte-ye shoru-e khubi baraye kam kardan-e fasele-ye train/val roye 20k.
weight_decay: 0.0001
# EN: label_smoothing softens the answer target (0.0 = plain CE). Helps the case
#     where val_loss climbs (over-confidence) while val_acc is flat.
# FA: label_smoothing target-e javab ro narm mikone (0.0 = CE-ye sade). Baraye
#     halati ke val_loss bala mire vali val_acc sabete komak mikone.
label_smoothing: 0.05
max_question_len: 14
max_answer_len: 6
vocab_min_freq: 4
# HARNESS: AMP roshan baraye train-e sari-tar roye T4.
use_amp: true
max_regions: 32
cache_regions: true
region_cache_dir: /kaggle/working/region_cache/vqa
# cache_global: khoroji raw ResNet-101 (2048d, qabl az g_proj) disk save mikone.
# g_proj linear layer CACHE NEMISHE va hamishe ejra mishe (trainable).
cache_global: true
global_cache_dir: /kaggle/working/global_cache/vqa
image_size: 448
device: cuda
# HARNESS: ddp roshan baraye 2xT4. Ejra:
#   torchrun --nproc_per_node=2 train.py --config configs/kaggle_mini.yaml
#   (roye single GPU: ddp: false + python train.py ...)
ddp: true
ddp_backend: nccl
# find_unused_parameters: lazem ast chon model frozen submodule dare (ImageCaptioner).
# DDP ba in flag autograd graph ro check mikone ta parameters bi-gradient skip beshe.
ddp_find_unused_parameters: true
hidden_dim: 512
word_dim: 512
question_dim: 1280
fuse_mode: concat
# dropout: ba'de har projection (g_proj, local_proj, q_proj, v_att) va bayn LSTM cells va qabl az classifier.
# 0.3 standard baraye VQA ast (Bottom-Up & Top-Down paper ham hamin estefade mikone).
dropout: 0.1
save_dir: outputs/kaggle_mini
# HARNESS (architecture comparison): zir-majmue-ye "mini vali vaghei" —
#   bozorg baraye neshoon dadan-e farq-e generalization, kuchik baraye iterate-e sari.
#   Roye 100 sample nemishe memari entekhab kard (val=noise); in andaze meaningful ast.
max_train_qids: 20000
max_val_qids: 2000

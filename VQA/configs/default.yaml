seed: 42
# VQA v2: use absolute paths on Kaggle (e.g. /kaggle/input/vqa-v2/...). Run from VQA/ for relative paths.
train_questions_json: ../dataset/v2_OpenEnded_mscoco_train2014_questions.json
train_annotations_json: ../dataset/v2_mscoco_train2014_annotations.json
val_questions_json: ../dataset/v2_OpenEnded_mscoco_val2014_questions.json
val_annotations_json: ../dataset/v2_mscoco_val2014_annotations.json
train_images_dir: ../dataset/train2014
val_images_dir: ../dataset/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
captioner_project_root: ../SimpleImageCaptioner
captioner_ckpt: ../SimpleImageCaptioner/outputs/default/best.pt
captioner_class: SimpleImageCaptioner
num_workers: 2
prefetch_factor: 2
pin_memory: true
persistent_workers: true
batch_size: 4
grad_accum_steps: 4
epochs: 25
learning_rate: 0.0005
lr_decay_every: 4
lr_decay_factor: 0.6
dropout: 0.5
max_question_len: 14
max_answer_len: 6
vocab_min_freq: 4
use_amp: true
max_regions: 32
device: cuda
hidden_dim: 512
word_dim: 512
question_dim: 1280
fuse_mode: mul
save_dir: outputs

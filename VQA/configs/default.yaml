seed: 42
dataset_root: ../dataset
captioner_project_root: ../ImageCaptioner
captioner_ckpt: ../ImageCaptioner/outputs/best.pt
captioner_class: ImageCaptionerV1
num_workers: 2
prefetch_factor: 2
pin_memory: true
persistent_workers: true
batch_size: 4
grad_accum_steps: 4
epochs: 25
learning_rate: 0.0005
lr_decay_every: 4
lr_decay_factor: 0.6
dropout: 0.5
max_question_len: 14
max_answer_len: 6
vocab_min_freq: 4
use_amp: true
max_regions: 32
device: cuda
hidden_dim: 512
word_dim: 512
question_dim: 1280
fuse_mode: mul
save_dir: outputs

seed: 42
# MSCOCO captioning: set absolute paths on Kaggle (e.g. /kaggle/input/coco-2014/...).
# Run locally from the ImageCaptioner folder so relative paths resolve next to the repo layout.
train_captions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/Caption/Caption/captions_train2014.json
val_captions_json: /kaggle/input/datasets/mnhlfuch/vqa-v2/Caption/Caption/captions_val2014.json
train_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/train2014
val_images_dir: /kaggle/input/datasets/mnhlfuch/vqa-v2/VQA v2/VQA v2/Images/val2014
train_image_filename_template: "COCO_train2014_{image_id:012d}.jpg"
val_image_filename_template: "COCO_val2014_{image_id:012d}.jpg"
num_workers: 2
prefetch_factor: 2
pin_memory: true
persistent_workers: true
batch_size: 8
grad_accum_steps: 2
epochs: 2
learning_rate: 0.0005
lr_decay_every: 4
lr_decay_factor: 0.6
weight_decay: 0.0
dropout: 0.5
max_question_len: 14
max_caption_len: 20
vocab_min_freq: 4
use_amp: true
max_regions: 8
device: cuda
hidden_dim: 512
word_dim: 512
question_dim: 1280
save_dir: outputs/kaggle
max_train_images: 10
max_val_images: 10
